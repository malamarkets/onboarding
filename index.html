<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mala markets – Onboarding</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --coal: #1a1a1a; --red: #d42b2b; --bg: #f5f5f5; --white: #fff; --border: #e3e3e3; --muted: #888; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--coal); min-height: 100vh; }
.topbar { background: var(--coal); padding: 0 40px; height: 54px; display: flex; align-items: center; }
.t-logo { display: flex; align-items: center; gap: 5px; font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 17px; color: white; text-decoration: none; letter-spacing: -0.02em; }
.t-logo .outline { -webkit-text-stroke: 1.5px white; color: transparent; }
.hero { padding: 64px 40px 48px; max-width: 760px; margin: 0 auto; }
.hero h1 { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 28px; margin-bottom: 10px; }
.hero p { color: var(--muted); font-size: 15px; line-height: 1.6; }
.cards { max-width: 760px; margin: 0 auto; padding: 0 40px 64px; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
.card { background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 24px; text-decoration: none; color: var(--coal); transition: box-shadow .15s, transform .15s; display: block; }
.card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.08); transform: translateY(-2px); }
.card-name { font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 16px; margin-bottom: 4px; }
.card-meta { font-size: 13px; color: var(--muted); }
.card-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #27a05a; margin-right: 6px; vertical-align: middle; }
</style>
</head>
<body>
<div class="topbar">
  <a class="t-logo" href="#">mala <span class="outline">markets</span></a>
</div>
<div class="hero">
  <h1>Mitarbeiter Onboarding</h1>
  <p>Hier findest du alle personalisierten Onboarding-Seiten. Jeder Link ist individuell für den jeweiligen Mitarbeitenden erstellt.</p>
</div>
<div class="cards">
  <a class="card" href="./dieter/">
    <div class="card-name"><span class="card-dot"></span>Dieter Nikolai</div>
    <div class="card-meta">Start: 1. April 2026</div>
  </a>
  <a class="card" href="./fabian/">
    <div class="card-name"><span class="card-dot"></span>Fabian Wegener</div>
    <div class="card-meta">Start: 1. April 2026</div>
  </a>
</div>
</body>
</html>
